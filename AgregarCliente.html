<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agregar Cliente - TEKILA ADMIN</title>
  <link rel="stylesheet" href="estilo.css">
  <style>
    .admin-layout { display: flex; justify-content: center; margin: 50px auto; padding: 0 20px; }
    .form-container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
    .dark-mode .form-container { background: #222; color: #fff; }

    .formulario-grupo { margin-bottom: 20px; }
    .formulario-grupo label { display: block; margin-bottom: 8px; font-weight: bold; }
    .formulario-grupo input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .dark-mode .formulario-grupo input { background: #333; color: #fff; border-color: #555; }

    .btn-guardar { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; background-color: #848484; margin-right: 10px; }
    .btn-cancelar { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; background-color: #070707; }
    
    #mensajeExito {
      display: none;
      background-color: #4CAF50;
      color: white;
      text-align: center;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 5px;
      font-weight: bold;
    }
    .dark-mode #mensajeExito { background-color: #45a049; }

    #mensajeError {
      display: none;
      background-color: #f44336;
      color: white;
      text-align: center;
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 5px;
      font-weight: bold;
    }
  </style>
</head>
<body class="light-mode">

  <header class="header-principal">
    <img src="Imagenes/205164.png" alt="Logo Agave" class="logo-pequeno">
    <h1>TEKILA</h1>
    <h2>ADMIN</h2>
  </header>

  <button class="toggle-button" onclick="toggleMode()">Modo Oscuro / Modo Claro</button>

  <nav>
    <div><a href="Inicio.html">Inicio</a></div>
    <div class="dropdown"><a href="LoginAdmin.html">Cerrar sesión</a></div>
  </nav>


  <div class="admin-layout">
    <div class="form-container">
      <h2 style="margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px;">Nuevo Cliente</h2>
      
      <div id="mensajeExito">CLIENTE AGREGADO</div>
      <div id="mensajeError">Por favor, llena los campos obligatorios</div>
      
      <form id="formAgregarCliente" onsubmit="guardarNuevoCliente(event)">
        <div class="formulario-grupo">
          <label for="nombre">Nombre Completo:</label>
          <input type="text" id="nombre" >
        </div>
        
        <div class="formulario-grupo">
          <label for="correo">Correo Electrónico:</label>
          <input type="text" id="correo">
        </div>
        
        <div class="formulario-grupo">
          <label for="telefono">Teléfono:</label>
          <input type="text" id="telefono" >
        </div>

        <div style="margin-top: 30px; text-align: right;">
          <button type="button" class="btn-cancelar" onclick="window.location.href='AdminClientes.html'">Cancelar</button>
          <button type="submit" class="btn-guardar">Guardar Cliente</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    function guardarNuevoCliente(event) {
      event.preventDefault(); 

      const nombre = document.getElementById('nombre').value;
      const correo = document.getElementById('correo').value;
      const telefono = document.getElementById('telefono').value;

      if(nombre.trim() === "" || correo.trim() === "") {
        document.getElementById('mensajeError').style.display = 'block';
        setTimeout(() => { document.getElementById('mensajeError').style.display = 'none'; }, 3000);
        return;
      }

      let clientes = JSON.parse(localStorage.getItem("clientesTEKILA")) || [];
      const fechaHoy = new Date().toISOString().split('T')[0];

      const nuevoCliente = {
        id: Date.now(),
        nombre: nombre,
        correo: correo,
        telefono: telefono,
        fecha: fechaHoy,
        pedidos: 0
      };

      clientes.push(nuevoCliente);
      localStorage.setItem("clientesTEKILA", JSON.stringify(clientes));

      document.getElementById('formAgregarCliente').style.display = 'none';
      document.getElementById('mensajeError').style.display = 'none';
      document.getElementById('mensajeExito').style.display = 'block';

      setTimeout(() => {
        window.location.href = "AdminClientes.html";
      }, 2000);
    }
  </script>
</body>
</html>
