<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Cliente - TEKILA ADMIN</title>
  <link rel="stylesheet" href="estilo.css">
  <style>
    .admin-layout { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 20px; 
      max-width: 1200px; 
      margin: 30px auto; 
      padding: 0 20px; 
    }
    .admin-sidebar { 
      width: 250px; 
      background-color: rgba(0, 0, 0, 0.05); 
      padding: 20px; 
      border-radius: 8px; 
      height: fit-content; 
    }
    .dark-mode .admin-sidebar { background-color: rgba(255, 255, 255, 0.05); }
    .admin-sidebar h3 { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
    .admin-sidebar ul { list-style: none; padding: 0; }
    .admin-sidebar li { margin-bottom: 10px; }
    .admin-sidebar a { display: block; padding: 12px; border-radius: 5px; text-decoration: none; color: inherit; font-weight: bold; transition: background 0.3s, color 0.3s; }
    .admin-sidebar a:hover, .admin-sidebar a.activo { background-color: #333; color: #fff; }
    .dark-mode .admin-sidebar a:hover, .dark-mode .admin-sidebar a.activo { background-color: #fff; color: #333; }
    .admin-content { flex: 1; min-width: 300px; }

    .btn-detalle { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; background-color: #333; font-size: 14px; transition: background 0.2s; }
    .btn-detalle:hover { background-color: #555; }

    .form-container { 
      background: #fff; 
      padding: 30px; 
      border-radius: 8px; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
      max-width: 500px; 
      margin: 0 auto;
    }
    .dark-mode .form-container { background: #222; color: #fff; }
    .formulario-grupo { margin-bottom: 20px; }
    .formulario-grupo label { display: block; margin-bottom: 8px; font-weight: bold; }
    .formulario-grupo input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .dark-mode .formulario-grupo input { background: #333; color: #fff; border-color: #555; }
    
    .btn-guardar { 
      padding: 10px 20px; 
      border: none; 
      border-radius: 5px; 
      cursor: pointer; 
      color: white; 
      font-weight: bold; 
      background-color: #848484; 
      margin-right: 10px; 
      transition: all 0.3s ease;
    }
    .btn-cancelar { 
      padding: 10px 20px; 
      border: none; 
      border-radius: 5px; 
      cursor: pointer; 
      color: white; 
      font-weight: bold; 
      background-color: #070707; 
    }

    .mensaje-flotante {
      display: none; 
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #333;
      color: #fff;
      padding: 15px 25px;
      border-radius: 5px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      z-index: 1000;
      font-weight: bold;
      animation: aparecer 0.3s ease-out;
    }
    .mensaje-flotante.exito { border-left: 5px solid #5cb85c; }
    .mensaje-flotante.alerta { border-left: 5px solid #d9534f; }

    @keyframes aparecer {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body class="light-mode">

  <header class="header-principal">
    <img src="Imagenes/205164.png" alt="Logo Agave" class="logo-pequeno">
    <h1>TEKILA</h1>
    <h2>ADMIN</h2>
  </header>

  <button class="toggle-button" onclick="toggleMode()">Modo Oscuro / Modo Claro</button>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h3>Panel Admin</h3>
      <ul>
        <li><a href="PerfilAdmin.html">Dashboard</a></li>
        <li><a href="AdminProductos.html">Productos</a></li>
        <li><a href="AdminPedidos.html">Pedidos</a></li>
        <li><a href="AdminPromociones.html">Promociones</a></li>
        <li><a href="AdminClientes.html" class="activo">Clientes</a></li>
        <li><a href="AdminReportes.html">Reportes</a></li>
      </ul>
      <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
      <button class="btn-detalle" style="width: 100%; background-color: #0e0e0e;" onclick="cerrarSesion()">Cerrar sesión</button>
      <div id="mensaje-logout" style="display: none; text-align: center; margin-top: 10px; color: #d9534f; font-weight: bold;">Cerrando sesión...</div>
    </aside>

    <main class="admin-content">
      <div class="form-container">
        <h2 style="margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; text-align: center;">Editar Cliente</h2>
        
        <form id="formEditar" onsubmit="guardarCambios(event)">
          <input type="hidden" id="clienteId">
          
          <div class="formulario-grupo">
            <label>Nombre:</label>
            <input type="text" id="nombre">
          </div>
          
          <div class="formulario-grupo">
            <label>Correo:</label>
            <input type="text" id="correo">
          </div>
          
          <div class="formulario-grupo">
            <label>Teléfono:</label>
            <input type="text" id="telefono">
          </div>
          
          <div style="margin-top: 30px; text-align: right;">
            <button type="button" class="btn-cancelar" onclick="window.location.href='AdminClientes.html'">Cancelar</button>
            <button type="submit" id="btnGuardarCliente" class="btn-guardar">Guardar Cambios</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <div id="mensaje-flotante" class="mensaje-flotante"></div>

  <script>
    function toggleMode() {
      document.body.classList.toggle("dark-mode");
      document.body.classList.toggle("light-mode");
    }

    function cerrarSesion() {
      const mensaje = document.getElementById("mensaje-logout");
      mensaje.style.display = "block";

      setTimeout(() => {
        window.location.href = "LoginAdmin.html";
      }, 1500);
    }

    function mostrarNotificacion(texto, tipoClase) {
      const mensaje = document.getElementById('mensaje-flotante');
      mensaje.textContent = texto;
      mensaje.className = `mensaje-flotante ${tipoClase}`; 
      mensaje.style.display = 'block';
      setTimeout(() => {
        mensaje.style.display = 'none';
      }, 3000);
    }

    const idEdicion = new URLSearchParams(window.location.search).get('id');
    let clientes = JSON.parse(localStorage.getItem("clientesTEKILA")) || [];

    window.onload = () => {
      const cliente = clientes.find(c => String(c.id) === String(idEdicion));
      if (cliente) {
        document.getElementById('clienteId').value = cliente.id;
        document.getElementById('nombre').value = cliente.nombre;
        document.getElementById('correo').value = cliente.correo;
        document.getElementById('telefono').value = cliente.telefono;
      }
    };

    function guardarCambios(e) {
      e.preventDefault();
      const boton = document.getElementById('btnGuardarCliente');
      const idForm = document.getElementById('clienteId').value;
      const index = clientes.findIndex(c => String(c.id) === String(idForm));
      
      if (index !== -1) {
        clientes[index].nombre = document.getElementById('nombre').value;
        clientes[index].correo = document.getElementById('correo').value;
        clientes[index].telefono = document.getElementById('telefono').value;
        
        localStorage.setItem("clientesTEKILA", JSON.stringify(clientes));
        
        boton.innerText = "CLIENTE ACTUALIZADO";
        boton.style.backgroundColor = "#28a745";
        boton.style.color = "white";

        setTimeout(() => {
          window.location.href = 'AdminClientes.html';
        }, 1500);
      }
    }
  </script>
</body>
</html>
