<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Publicar en Mercado - TEKILA</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body class="light-mode">
  <main style="max-width: 600px; margin: 40px auto; padding: 20px;" class="caja-info">
    <h2>NUEVA PUBLICACIÓN</h2>
    <input type="text" id="nombrePub" placeholder="Nombre" style="width:100%; margin-bottom:10px;">
    <input type="number" id="precioPub" placeholder="Precio" style="width:100%; margin-bottom:10px;">
    <select id="catPub" style="width:100%; margin-bottom:10px;">
      <option value="Reposado">Reposado</option>
      <option value="Blanco">Blanco</option>
      <option value="Añejo">Añejo</option>
      <option value="Premium">Premium</option>
    </select>
    <input type="text" id="imgPub" placeholder="URL Imagen" style="width:100%; margin-bottom:10px;">
    <textarea id="descPub" placeholder="Descripción" style="width:100%; margin-bottom:10px;"></textarea>
    <button class="btn-detalle" onclick="guardarPub()">PUBLICAR EN MERCADO</button>
  </main>
  <script>
    function guardarPub() {
      const nuevaPub = {
        id: Date.now(),
        nombre: document.getElementById('nombrePub').value,
        precio: document.getElementById('precioPub').value,
        categoria: document.getElementById('catPub').value,
        imagen: document.getElementById('imgPub').value,
        descripcion: document.getElementById('descPub').value,
        autor: "Alan"
      };
      let lista = JSON.parse(localStorage.getItem('mercadoTekila')) || [];
      lista.push(nuevaPub);
      localStorage.setItem('mercadoTekila', JSON.stringify(lista));
      alert("Publicación realizada");
      window.location.href = "Mercado.html";
    }
  </script>
</body>
</html>
