<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Promoción - TEKILA ADMIN</title>
  <link rel="stylesheet" href="estilo.css">
  <style>
    .admin-layout { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    .admin-sidebar { width: 250px; background-color: rgba(0, 0, 0, 0.05); padding: 20px; border-radius: 8px; height: fit-content; }
    .dark-mode .admin-sidebar { background-color: rgba(255, 255, 255, 0.05); }
    .admin-sidebar h3 { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
    .admin-sidebar ul { list-style: none; padding: 0; }
    .admin-sidebar li { margin-bottom: 10px; }
    .admin-sidebar a { display: block; padding: 12px; border-radius: 5px; text-decoration: none; color: inherit; font-weight: bold; transition: background 0.3s, color 0.3s; }
    .admin-sidebar a:hover, .admin-sidebar a.activo { background-color: #333; color: #fff; }
    .dark-mode .admin-sidebar a:hover, .dark-mode .admin-sidebar a.activo { background-color: #fff; color: #333; }
    .admin-content { flex: 1; min-width: 300px; }
    
    .form-container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 800px; }
    .dark-mode .form-container { background: #222; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
    .dark-mode .form-group input, .dark-mode .form-group select, .dark-mode .form-group textarea { background: #333; color: #fff; border-color: #555; }
    .form-row { display: flex; gap: 20px; flex-wrap: wrap; }
    .form-row .form-group { flex: 1; min-width: 200px; }
    
    .modal-botones { display: flex; gap: 10px; margin-top: 30px; }
    .btn-detalle { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; background-color: #333; font-size: 14px; }
    .btn-detalle:hover { background-color: #555; }
    .btn-cancelar { background-color: #888; }
    .btn-cancelar:hover { background-color: #666; }

    #mensajeExito {
      display: none;
      background-color: #4CAF50;
      color: white;
      text-align: center;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 5px;
      font-weight: bold;
    }
    .dark-mode #mensajeExito {
      background-color: #45a049;
    }
  </style>
</head>
<body class="light-mode">

  <header class="header-principal">
    <img src="Imagenes/205164.png" alt="Logo Agave" class="logo-pequeno">
    <h1>TEKILA</h1>
    <h2>ADMIN</h2>
  </header>

  <button class="toggle-button" onclick="toggleMode()">Modo Oscuro / Modo Claro</button>

  <nav>
    <div><a href="Inicio.html">Inicio</a></div>
    <div class="dropdown"><a href="LoginAdmin.html">Cerrar sesión</a></div>
  </nav>
  
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h3>Panel Admin</h3>
      <ul>
      <li><a href="PerfilAdmin.html">Dashboard</a></li>
        <li><a href="AdminProductos.html">Productos</a></li>
        <li><a href="AdminPedidos.html">Pedidos</a></li>
        <li><a href="AdminPromociones.html" class="activo">Promociones</a></li>
        <li><a href="AdminClientes.html">Clientes</a></li>
        <li><a href="AdminReportes.html" >Reportes</a></li>
      </ul>
      <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
      <button class="btn-detalle" style="width: 100%; background-color: #0e0e0e;" onclick="cerrarSesion()">Cerrar sesión</button>
    </aside>

    <main class="admin-content">
      <h2 style="margin-top: 0; margin-bottom: 25px;">Editar Promoción</h2>

      <div id="mensajeExito">PROMOCION ACTUALIZADA</div>

      <div class="form-container" id="contenedorFormulario" style="display: none;">
        <form id="formularioPromocion" onsubmit="guardarEdicionPromocion(event)">
          <input type="hidden" id="promoId">

          <div class="form-group">
            <label>Nombre de la Promoción:</label>
            <input type="text" id="promoNombre" >
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label>% Descuento :</label>
              <input type="number" id="promoDescuento" min="1" max="100" >
            </div>
            <div class="form-group">
              <label>Producto a aplicar:</label>
              <select id="promoProducto" >
                <option value="">Cargando productos...</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Fecha de Inicio:</label>
              <input type="date" id="promoInicio" >
            </div>
            <div class="form-group">
              <label>Fecha de Fin:</label>
              <input type="date" id="promoFin" >
            </div>
          </div>

          <div class="form-group">
            <label>Descripción:</label>
            <textarea id="promoDescripcion" rows="3"></textarea>
          </div>

          <div class="modal-botones">
            <button type="submit" class="btn-detalle">Guardar Cambios</button>
            <button type="button" class="btn-detalle btn-cancelar" onclick="window.location.href='AdminPromociones.html'">Cancelar y volver</button>
          </div>
        </form>
      </div>

      <div id="mensajeError" style="display: none; color: red; font-weight: bold; text-align: center; padding: 50px;">
        Promoción no encontrada.
      </div>

    </main>
  </div>

  <script>
    function toggleMode() {
      document.body.classList.toggle("dark-mode");
      document.body.classList.toggle("light-mode");
    }

    function cerrarSesion() { 
        window.location.href = "LoginAdmin.html"; 
    }

    let promocionesGlobal = [];

    window.onload = function() {
      const selectProducto = document.getElementById('promoProducto');
      const inventarioGuardado = JSON.parse(localStorage.getItem('inventarioAdminV2')) || [];
      
      selectProducto.innerHTML = '<option value="">Seleccione un producto</option><option value="Todos">Aplicar a todos los productos</option>';
      
      if (inventarioGuardado.length > 0) {
        inventarioGuardado.forEach(prod => {
          const opcion = document.createElement('option');
          opcion.value = prod.id;
          opcion.textContent = prod.nombre;
          selectProducto.appendChild(opcion);
        });
      }

      const parametros = new URLSearchParams(window.location.search);
      const idPromocion = parametros.get('id');

      if (idPromocion) {
        promocionesGlobal = JSON.parse(localStorage.getItem('promocionesAdmin')) || [];
        const promoActual = promocionesGlobal.find(p => p.id == idPromocion);

        if (promoActual) {
          document.getElementById('promoId').value = promoActual.id;
          document.getElementById('promoNombre').value = promoActual.nombre;
          document.getElementById('promoDescuento').value = promoActual.descuento;
          
          if (promoActual.productoId) {
            document.getElementById('promoProducto').value = promoActual.productoId;
          } else if (promoActual.productoNombre) {
            const opcionDefault = document.createElement('option');
            opcionDefault.value = "default_temp";
            opcionDefault.textContent = promoActual.productoNombre;
            selectProducto.appendChild(opcionDefault);
            document.getElementById('promoProducto').value = "default_temp";
          }

          document.getElementById('promoInicio').value = promoActual.fechaInicio;
          document.getElementById('promoFin').value = promoActual.fechaFin;
          document.getElementById('promoDescripcion').value = promoActual.descripcion || '';
          
          document.getElementById('contenedorFormulario').style.display = 'block';
        } else {
          document.getElementById('mensajeError').style.display = 'block';
        }
      } else {
        document.getElementById('mensajeError').style.display = 'block';
      }
    };

    function guardarEdicionPromocion(event) {
      event.preventDefault(); 

      const idForm = document.getElementById('promoId').value;
      const index = promocionesGlobal.findIndex(p => p.id == idForm);

      if(index !== -1) {
        const selectObj = document.getElementById('promoProducto');
        
        let prodNombre = "Seleccione un producto";
        let prodId = "";
        
        if (selectObj.selectedIndex !== -1) {
            prodNombre = selectObj.options[selectObj.selectedIndex].text;
            prodId = selectObj.value;
        }
        
        promocionesGlobal[index].nombre = document.getElementById('promoNombre').value;
        promocionesGlobal[index].descuento = document.getElementById('promoDescuento').value;
        promocionesGlobal[index].productoId = prodId;
        promocionesGlobal[index].productoNombre = prodNombre;
        promocionesGlobal[index].fechaInicio = document.getElementById('promoInicio').value;
        promocionesGlobal[index].fechaFin = document.getElementById('promoFin').value;
        promocionesGlobal[index].descripcion = document.getElementById('promoDescripcion').value;

        localStorage.setItem('promocionesAdmin', JSON.stringify(promocionesGlobal));
        
        document.getElementById('contenedorFormulario').style.display = 'none';
        document.getElementById('mensajeExito').style.display = 'block';
        
        setTimeout(() => {
          window.location.href = 'AdminPromociones.html';
        }, 2000);
      }
    }
  </script>
</body>
</html>
