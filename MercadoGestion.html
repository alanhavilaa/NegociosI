<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mis Publicaciones - TEKILA</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body class="light-mode">
  <header class="header-principal">
    <img src="Imagenes/205164.png" alt="Logo" class="logo-pequeno">
    <h1>TEKILA</h1>
  </header>
  
  <nav>
    <a href="Inicio.html">Inicio</a>
    <a href="Catalogo.html">Catálogo</a>
    <a href="Promociones.html">Promociones</a>
    <a href="Nosotros.html">Nosotros</a>
    <a href="Contacto.html">Contacto</a>
    <a href="Comunidad.html">Comunidad</a>
    <a href="Login.html">Iniciar sesión</a>
    <a href="Carrito.html" style="font-weight: bold;">Carrito</a>
  </nav>

  <main style="max-width: 900px; margin: 40px auto; padding: 0 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 10px; flex-wrap: wrap;">
      <h2>MIS PUBLICACIONES</h2>
      <div style="display: flex; gap: 10px;">
        <button class="btn-detalle"  onclick="window.location.href='Mercado.html'">Volver al Mercado</button>
        <button class="btn-detalle" onclick="window.location.href='MercadoPublicar.html'">Nueva Publicación</button>
      </div>
    </div>

    <table class="tabla-subasta" style="width:100%; margin: 0;">
      <thead>
        <tr>
          <th>Img</th>
          <th>Producto</th>
          <th>Precio</th>
          <th>Categoría</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="listaMisPubs"></tbody>
    </table>
  </main>

  <script>
    function renderizarMisPubs() {
      let pubs = JSON.parse(localStorage.getItem('mercadoTekila')) || [];
      let tbody = document.getElementById('listaMisPubs');
      tbody.innerHTML = "";
      
      let misPubs = pubs.filter(p => p.autor === "Alan");

      if(misPubs.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:30px; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;">No has publicado ningún producto aún.</td></tr>`;
        return;
      }

      misPubs.forEach(p => {
        tbody.innerHTML += `
          <tr>
            <td><img src="${p.imagen || 'Imagenes/placeholder.png'}" style="width:50px; height:50px; object-fit:contain;"></td>
            <td><strong>${p.nombre || 'Sin nombre'}</strong></td>
            <td>$${p.precio ? parseFloat(p.precio).toFixed(2) : '0.00'}</td>
            <td>${p.categoria || 'Sin categoría'}</td>
            <td>
              <div style="display:flex; gap:10px; justify-content: center;">
                <button class="cookie-btn" onclick="window.location.href='MercadoEditar.html?id=${p.id}'">Editar</button>
                <button class="btn-eliminar" style="padding: 5px 15px; font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase;" onclick="eliminarMiPub(${p.id})">Borrar</button>
              </div>
            </td>
          </tr>
        `;
      });
    }

    function eliminarMiPub(id) {
      let pubs = JSON.parse(localStorage.getItem('mercadoTekila')) || [];
      pubs = pubs.filter(p => p.id !== id);
      localStorage.setItem('mercadoTekila', JSON.stringify(pubs));
      renderizarMisPubs();
    }

    document.addEventListener("DOMContentLoaded", renderizarMisPubs);
  </script>
</body>
</html>
