<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Publicar en Mercado - TEKILA</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body class="light-mode">
  <header class="header-principal">
    <img src="Imagenes/205164.png" alt="Logo" class="logo-pequeno">
    <h1>TEKILA</h1>
  </header>
  
  <nav>
    <a href="Inicio.html">Inicio</a>
    <a href="Catalogo.html">Catálogo</a>
    <a href="Promociones.html">Promociones</a>
    <a href="Nosotros.html">Nosotros</a>
    <a href="Contacto.html">Contacto</a>
    <a href="Comunidad.html">Comunidad</a>
    <a href="Login.html">Iniciar sesión</a>
    <a href="Carrito.html" style="font-weight: bold;">Carrito</a>
  </nav>

  <main style="max-width: 600px; margin: 40px auto; padding: 20px;">
    <div class="caja-info" style="text-align: left;">
      <h2>NUEVA PUBLICACIÓN</h2>
                  <div id="mensajeExito">PUBLICACIÓN GUARDADA</div>

      
      <div class="formulario-contacto" style="max-width: 100%; gap: 5px;">
        <label>Nombre:</label>
        <input type="text" id="nombrePub" placeholder="Nombre del producto">
        
        <label>Precio:</label>
        <input type="text" id="precioPub" placeholder="Precio">
        
        <label>Categoría:</label>
        <select id="catPub" style="width:100%; padding: 10px 15px; border: 1px solid #000; background: transparent; font-family: 'Montserrat', sans-serif; font-size: 0.9rem; outline: none; margin-bottom: 15px;">
          <option value="Reposado">Reposado</option>
          <option value="Blanco">Blanco</option>
          <option value="Añejo">Añejo</option>
          <option value="Premium">Premium</option>
        </select>
        
        <label>URL Imagen:</label>
        <input type="text" id="imgPub" placeholder="URL de la imagen">
        
        <label>Descripción:</label>
        <textarea id="descPub" placeholder="Descripción" style="width:100%; margin-bottom:20px; padding:10px 15px; border:1px solid #000; background:transparent; font-family:'Montserrat', sans-serif; font-size:0.9rem; outline:none; resize:vertical;" rows="4"></textarea>
        
        <div style="display:flex; gap:15px; width: 100%;">
          <button class="btn-detalle" style="flex:1;" onclick="guardarPub()">PUBLICAR EN MERCADO</button>
          <button class="btn-detalle" style="flex:1;" onclick="window.location.href='Mercado.html'">CANCELAR</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    function guardarPub() {
      const nuevaPub = {
        id: Date.now(),
        nombre: document.getElementById('nombrePub').value,
        precio: document.getElementById('precioPub').value,
        categoria: document.getElementById('catPub').value,
        imagen: document.getElementById('imgPub').value,
        descripcion: document.getElementById('descPub').value,
        autor: "Alan"
      };
      
      let lista = JSON.parse(localStorage.getItem('mercadoTekila')) || [];
      lista.push(nuevaPub);
      localStorage.setItem('mercadoTekila', JSON.stringify(lista));
    document.getElementById('mensajeExito').style.display = 'block';
      setTimeout(() => {
      window.location.href = 'MercadoGestion.html';
    }, 2000);
    }
  </script>
</body>
</html>
