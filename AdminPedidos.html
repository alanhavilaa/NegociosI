<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Pedidos - TEKILA ADMIN</title>
  <link rel="stylesheet" href="estilo.css">
  <style>
    .admin-layout { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    .admin-sidebar { width: 250px; background-color: rgba(0, 0, 0, 0.05); padding: 20px; border-radius: 8px; height: fit-content; }
    .dark-mode .admin-sidebar { background-color: rgba(255, 255, 255, 0.05); }
    .admin-sidebar h3 { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
    .admin-sidebar ul { list-style: none; padding: 0; }
    .admin-sidebar li { margin-bottom: 10px; }
    .admin-sidebar a { display: block; padding: 12px; border-radius: 5px; text-decoration: none; color: inherit; font-weight: bold; transition: background 0.3s, color 0.3s; }
    .admin-sidebar a:hover, .admin-sidebar a.activo { background-color: #333; color: #fff; }
    .dark-mode .admin-sidebar a:hover, .dark-mode .admin-sidebar a.activo { background-color: #fff; color: #333; }
    .admin-content { flex: 1; min-width: 300px; overflow-x: auto; }

    .btn-detalle { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; background-color: #333; font-size: 14px; transition: background 0.2s; }
    .btn-detalle:hover { background-color: #555; }

    .tabla-admin { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 20px; }
    .dark-mode .tabla-admin { background: #222; }
    .tabla-admin th, .tabla-admin td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
    .dark-mode .tabla-admin th, .dark-mode .tabla-admin td { border-bottom-color: #444; }
    .tabla-admin th { background-color: #333; color: #fff; }
    .dark-mode .tabla-admin th { background-color: #111; }
    
    .select-estado { padding: 5px; border-radius: 4px; border: 1px solid #ccc; font-weight: bold; }
    .dark-mode .select-estado { background-color: #333; color: #fff; border-color: #555; }
    
    .estado-Pendiente { color: #090909; }
    .estado-Enviado { color: #6b6e6e; }
    .estado-Entregado { color: #505150; }
    .estado-Cancelado { color: #b00303; }
  </style>
</head>
<body class="light-mode">

  <header class="header-principal">
    <img src="C:\Users\eduar\Desktop\NegociosI\Imagenes/205164.png" alt="Logo Agave" class="logo-pequeno">
    <h1>TEKILA</h1>
    <h2>ADMIN</h2>
  </header>

  <button class="toggle-button" onclick="toggleMode()">Modo Oscuro / Modo Claro</button>

  <nav>
    <div><a href="file:///C:/Users/eduar/Desktop/NegociosI/Inicio.html">Inicio</a></div>
    <div class="dropdown"><a href="file:///C:/Users/eduar/Desktop/NegociosI/LoginAdmin.html">Cerrar sesión</a></div>
  </nav>
  
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h3>Panel Admin</h3>
      <ul>
        <li><a href="PerfilAdmin.html">Dashboard</a></li>
        <li><a href="AdminProductos.html">Productos</a></li>
        <li><a href="AdminPedidos.html" class="activo">Pedidos</a></li>
        <li><a href="AdminPromociones.html">Promociones</a></li>
        <li><a href="AdminClientes.html">Clientes</a></li>
        <li><a href="AdminReportes.html">Reportes</a></li>
      </ul>
      <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
      <button class="btn-detalle" style="width: 100%; background-color: #0e0e0e;" onclick="cerrarSesion()">Cerrar sesión</button>
    </aside>

    <main class="admin-content">
      <h2 style="margin-top: 0;">Gestión de Pedidos</h2>
      
      <table class="tabla-admin">
        <thead>
          <tr>
            <th>ID Pedido</th>
            <th>Cliente</th>
            <th>Fecha</th>
            <th>Total</th>
            <th>Estado</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="tablaPedidos">
          </tbody>
      </table>
    </main>
  </div>

  <script>
    function toggleMode() {
      document.body.classList.toggle("dark-mode");
      document.body.classList.toggle("light-mode");
    }

    function cerrarSesion() {
      window.location.href = "file:///C:/Users/eduar/Desktop/NegociosI/LoginAdmin.html";
    }

    let pedidos = JSON.parse(localStorage.getItem('pedidosAdmin')) || [
      { id: "PED-001", cliente: "Juan Pérez", fecha: "2023-10-25", total: 1250.00, estado: "Pendiente" },
      { id: "PED-002", cliente: "María Gómez", fecha: "2023-10-24", total: 850.50, estado: "Enviado" },
      { id: "PED-003", cliente: "Carlos Ruiz", fecha: "2023-10-20", total: 3200.00, estado: "Entregado" },
      { id: "PED-004", cliente: "Ana López", fecha: "2023-10-18", total: 450.00, estado: "Cancelado" }
    ];

    window.onload = function() {
      cargarPedidos();
      localStorage.setItem('pedidosAdmin', JSON.stringify(pedidos));
    };

    function cargarPedidos() {
      const tbody = document.getElementById('tablaPedidos');
      tbody.innerHTML = '';
      
      pedidos.forEach((pedido, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><strong>${pedido.id}</strong></td>
          <td>${pedido.cliente}</td>
          <td>${pedido.fecha}</td>
          <td>$${pedido.total.toFixed(2)}</td>
          <td class="estado-${pedido.estado}"><strong>${pedido.estado}</strong></td>
          <td>
            <select class="select-estado" onchange="cambiarEstado(${index}, this.value)">
              <option value="Pendiente" ${pedido.estado === 'Pendiente' ? 'selected' : ''}>Pendiente</option>
              <option value="Enviado" ${pedido.estado === 'Enviado' ? 'selected' : ''}>Enviado</option>
              <option value="Entregado" ${pedido.estado === 'Entregado' ? 'selected' : ''}>Entregado</option>
              <option value="Cancelado" ${pedido.estado === 'Cancelado' ? 'selected' : ''}>Cancelado</option>
            </select>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function cambiarEstado(index, nuevoEstado) {
      pedidos[index].estado = nuevoEstado;
      localStorage.setItem('pedidosAdmin', JSON.stringify(pedidos));
      cargarPedidos(); 
    }
  </script>
</body>
</html>
