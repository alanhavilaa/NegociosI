<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agregar Producto - TEKILA ADMIN</title>
  <link rel="stylesheet" href="estilo.css">
  <style>
    .admin-layout {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .admin-sidebar {
      width: 250px;
      background-color: rgba(0, 0, 0, 0.05);
      padding: 20px;
      border-radius: 8px;
      height: fit-content;
    }
    .dark-mode .admin-sidebar { background-color: rgba(255, 255, 255, 0.05); }
    .admin-sidebar h3 { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
    .admin-sidebar ul { list-style: none; padding: 0; }
    .admin-sidebar li { margin-bottom: 10px; }
    .admin-sidebar a { display: block; padding: 12px; border-radius: 5px; text-decoration: none; color: inherit; font-weight: bold; transition: background 0.3s, color 0.3s; }
    .admin-sidebar a:hover, .admin-sidebar a.activo { background-color: #333; color: #fff; }
    .dark-mode .admin-sidebar a:hover, .dark-mode .admin-sidebar a.activo { background-color: #fff; color: #333; }
    .admin-content { flex: 1; min-width: 300px; }

    .seccion-formulario {
      background-color: rgba(0, 0, 0, 0.02);
      padding: 25px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    .dark-mode .seccion-formulario {
      background-color: rgba(255, 255, 255, 0.02);
      border-color: #444;
    }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input, .form-group select, .form-group textarea { 
      width: 100%; 
      padding: 10px; 
      border: 1px solid #ccc; 
      border-radius: 4px; 
      box-sizing: border-box; 
      font-size: 16px;
    }
    .dark-mode .form-group input, .dark-mode .form-group select, .dark-mode .form-group textarea { 
      background: #333; 
      color: #fff; 
      border-color: #555; 
    }
    .form-row { display: flex; gap: 15px; flex-wrap: wrap; }
    .form-row .form-group { flex: 1; min-width: 200px; }
    .botones-accion { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }

    #mensajeExito {
      display: none;
      background-color: #4CAF50;
      color: white;
      text-align: center;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 5px;
      font-weight: bold;
    }
    .dark-mode #mensajeExito {
      background-color: #45a049;
    }
  </style>
</head>
<body class="light-mode">

  <header class="header-principal">
    <img src="C:\Users\eduar\Desktop\NegociosI\Imagenes/205164.png" alt="Logo Agave" class="logo-pequeno">
    <h1>TEKILA</h1>
    <h2>ADMIN</h2>
  </header>

  <button class="toggle-button" onclick="toggleMode()">Modo Oscuro / Modo Claro</button>


  
  <div class="admin-layout">
    
    <aside class="admin-sidebar">
      <h3>Panel Admin</h3>
      <ul>
         <li><a href="PerfilAdmin.html">Dashboard</a></li>
        <li><a href="AdminProductos.html" class="activo">Productos</a></li>
        <li><a href="AdminPedidos.html">Pedidos</a></li>
        <li><a href="AdminPromociones.html">Promociones</a></li>
        <li><a href="AdminClientes.html">Clientes</a></li>
        <li><a href="AdminReportes.html">Reportes</a></li>
      </ul>
      <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
      <button class="btn-detalle" style="width: 100%; background-color: #131313;" onclick="cerrarSesion()">Cerrar sesión</button>
    </aside>

    <main class="admin-content">
      <h2 style="margin-top: 0; margin-bottom: 25px;">Agregar Nuevo Producto</h2>
      
      <div id="mensajeExito">PRODUCTO AGREGADO.</div>
      
      <div class="seccion-formulario" id="contenedorFormulario">
        <form onsubmit="guardarNuevoProducto(event)">

          <div class="form-group">
            <label>ID:</label>
            <input type="text" id="prodId">
          </div>
          
          <div class="form-group">
            <label>Nombre del Producto:</label>
            <input type="text" id="prodNombre">
          </div>
          
          <div class="form-group">
            <div class="form-group">
              <label>Precio:</label>
              <input type="number" id="prodPrecio" min="0">
            </div>
            <div class="form-group">
              <label>existencia:</label>
              <input type="number" id="prodStock" min="0" placeholder="Unidades">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Categoría:</label>
              <select id="prodCategoria">
                <option value="Reposado">Reposado</option>
                <option value="Blanco">Blanco</option>
                <option value="Añejo">Añejo</option>
                <option value="Premium">Premium</option>
              </select>
            </div>
            <div class="form-group">
              <label>Estado:</label>
              <select id="prodEstado">
                <option value="Activo">Disponible</option>
                <option value="Inactivo">Agotado</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Imagen:</label>
            <input type="text" id="prodImagen">
          </div>

          <div class="form-group">
            <label>Descripción:</label>
            <textarea id="prodDescripcion" rows="4"></textarea>
          </div>

          <div class="botones-accion">
            <button type="button" class="btn-detalle" style="background-color: #070707;" onclick="window.location.href='AdminProductos.html'">Cancelar</button>
            <button type="submit" class="btn-detalle" style="background-color: #848484;">Guardar Producto</button>
          </div>
        </form>
      </div>
    </main>
  </div>
   
  <script>
    function toggleMode() {
      document.body.classList.toggle("dark-mode");
      document.body.classList.toggle("light-mode");
    }

    function cerrarSesion() {
      window.location.href = "LoginAdmin.html";
    }

    function guardarNuevoProducto(event) {
      event.preventDefault(); 

      let inventarioActual = JSON.parse(localStorage.getItem('inventarioAdminV2')) || [];

      const nuevoProducto = {
        id: Date.now(), 
        nombre: document.getElementById('prodNombre').value,
        precio: parseFloat(document.getElementById('prodPrecio').value),
        existencia: parseInt(document.getElementById('prodStock').value),
        categoria: document.getElementById('prodCategoria').value,
        estado: document.getElementById('prodEstado').value,
        imagen: document.getElementById('prodImagen').value,
        descripcion: document.getElementById('prodDescripcion').value
      };

      inventarioActual.unshift(nuevoProducto);

      localStorage.setItem('inventarioAdminV2', JSON.stringify(inventarioActual));
      
      document.getElementById('contenedorFormulario').style.display = 'none';
      document.getElementById('mensajeExito').style.display = 'block';
      
      setTimeout(() => {
        window.location.href = "AdminProductos.html";
      }, 2000);
    }
    function cerrarSesion(boton) {
  if (boton) {
    boton.innerText = "CERRANDO SESIÓN...";
    boton.classList.add("btn-cerrando-sesion");
  }

  setTimeout(() => {
    window.location.href = "LoginAdmin.html";
  }, 1200);
}
  </script>
</body>
</html>
