<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clientes - TEKILA ADMIN</title>
  <link rel="stylesheet" href="estilo.css">
  <style>
    .admin-layout { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    .admin-sidebar { width: 250px; background-color: rgba(0, 0, 0, 0.05); padding: 20px; border-radius: 8px; height: fit-content; }
    .dark-mode .admin-sidebar { background-color: rgba(255, 255, 255, 0.05); }
    .admin-sidebar h3 { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
    .admin-sidebar ul { list-style: none; padding: 0; }
    .admin-sidebar li { margin-bottom: 10px; }
    .admin-sidebar a { display: block; padding: 12px; border-radius: 5px; text-decoration: none; color: inherit; font-weight: bold; transition: background 0.3s, color 0.3s; }
    .admin-sidebar a:hover, .admin-sidebar a.activo { background-color: #333; color: #fff; }
    .dark-mode .admin-sidebar a:hover, .dark-mode .admin-sidebar a.activo { background-color: #fff; color: #333; }
    .admin-content { flex: 1; min-width: 300px; overflow-x: auto; }

    .btn-detalle { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; background-color: #333; font-size: 14px; transition: background 0.2s; }
    .btn-detalle:hover { background-color: #555; }

    .tabla-admin { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 20px; }
    .dark-mode .tabla-admin { background: #222; }
    .tabla-admin th, .tabla-admin td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
    .dark-mode .tabla-admin th, .dark-mode .tabla-admin td { border-bottom-color: #444; }
    .tabla-admin th { background-color: #333; color: #fff; }
    .dark-mode .tabla-admin th { background-color: #111; }

    .paginacion-container { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; }
    .btn-pagina { background-color: #333; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .btn-pagina:disabled { background-color: #999; cursor: not-allowed; }
    .info-pagina { font-weight: bold; }
  </style>
</head>
<body class="light-mode">

  <header class="header-principal">
    <img src="C:\Users\eduar\Desktop\NegociosI\Imagenes/205164.png" alt="Logo Agave" class="logo-pequeno">
    <h1>TEKILA</h1>
    <h2>ADMIN</h2>
  </header>

  <button class="toggle-button" onclick="toggleMode()">Modo Oscuro / Modo Claro</button>

  <nav>
    <div><a href="file:///C:/Users/eduar/Desktop/NegociosI/Inicio.html">Inicio</a></div>
    <div class="dropdown"><a href="file:///C:/Users/eduar/Desktop/NegociosI/LoginAdmin.html">Cerrar sesión</a></div>
  </nav>
  
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h3>Panel Admin</h3>
      <ul>
        <li><a href="PerfilAdmin.html">Dashboard</a></li>
        <li><a href="AdminProductos.html">Productos</a></li>
        <li><a href="AdminPedidos.html">Pedidos</a></li>
        <li><a href="AdminPromociones.html">Promociones</a></li>
        <li><a href="AdminClientes.html" class="activo">Clientes</a></li>
        <li><a href="AdminReportes.html">Reportes</a></li>
      </ul>
      <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
      <button class="btn-detalle" style="width: 100%; background-color: #0e0e0e;" onclick="cerrarSesion()">Cerrar sesión</button>
    </aside>

    <main class="admin-content">
      <h2 style="margin-top: 0;">Clientes</h2>
      <button class="btn-detalle" style="margin-bottom: 20px; background-color: #454545;" onclick="agregarCliente()">Agregar Cliente</button>
      
      <table class="tabla-admin">

<thead>
  <tr>
    <th>Nombre</th>
    <th>Correo Electrónico</th>
    <th>Teléfono</th>
    <th>Fecha de Registro</th>
    <th>Pedidos Realizados</th>
    <th>Acciones</th> </tr>
</thead>

          </tr>
        </thead>
        <tbody id="tablaClientes">
          </tbody>
      </table>

     <div class="paginacion-container" id="controles-paginacion">
  <button class="btn-pagina" id="btnAnterior" onclick="cambiarPagina(-1)">Anterior</button>
  <span class="info-pagina" id="infoPagina">Página 1</span>
  <button class="btn-pagina" id="btnSiguiente" onclick="cambiarPagina(1)">Siguiente</button>
</div>
    </main>
  </div>

 <script>
    let paginaActual = 1;
    const clientesPorPagina = 4;

    function inicializarDatos() {
      let clientes = JSON.parse(localStorage.getItem("clientesTEKILA"));
      if (!clientes || clientes.length === 0) {
        clientes = [
          { id: 1, nombre: "Gilberto Mora", correo: "gil.moraz@email.com", telefono: "449 555 1234", fecha: "2023-05-12", pedidos: 4 },
          { id: 2, nombre: "María Gómez", correo: "maria.g@email.com", telefono: "449 120 5678", fecha: "2023-06-20", pedidos: 1 },
          { id: 3, nombre: "Carlos Ruiz", correo: "cruiz99@email.com", telefono: "449 820 9876", fecha: "2023-08-01", pedidos: 8 },
          { id: 4, nombre: "Ana López", correo: "ana.lopez@email.com", telefono: "449 132 4321", fecha: "2023-09-15", pedidos: 0 },
          { id: 5, nombre: "Jesús Alejandro", correo: "alex.j@email.com", telefono: "449 444 7777", fecha: "2023-10-05", pedidos: 2 } 
        ];
        localStorage.setItem("clientesTEKILA", JSON.stringify(clientes));
      }
      return clientes;
    }

    function renderizarTabla() {
      const clientes = inicializarDatos();
      const tbody = document.getElementById('tablaClientes');
      const controlesPagina = document.getElementById('controles-paginacion');
      tbody.innerHTML = ''; 

      const totalPaginas = Math.ceil(clientes.length / clientesPorPagina);
      if (paginaActual > totalPaginas) paginaActual = totalPaginas;
      if (paginaActual < 1) paginaActual = 1;

      const inicio = (paginaActual - 1) * clientesPorPagina;
      const fin = inicio + clientesPorPagina;
      const clientesPagina = clientes.slice(inicio, fin);

      clientesPagina.forEach(cliente => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><strong>${cliente.nombre}</strong></td>
          <td>${cliente.correo}</td>
          <td>${cliente.telefono}</td>
          <td>${cliente.fecha}</td>
          <td>${cliente.pedidos}</td>
          <td>
            <button class="btn-editar" style="background: #aaa9a9; padding: 5px 10px; border:none; cursor:pointer;" 
            onclick="window.location.href='AdminEditarCliente.html?id=${cliente.id}'">Editar</button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById('infoPagina').textContent = `Página ${paginaActual} de ${totalPaginas || 1}`;
      document.getElementById('btnAnterior').disabled = (paginaActual === 1);
      document.getElementById('btnSiguiente').disabled = (paginaActual >= totalPaginas);
      controlesPagina.style.display = 'flex';
    }

    function cambiarPagina(direccion) {
      paginaActual += direccion;
      renderizarTabla();
    }

    function toggleMode() {
      document.body.classList.toggle("dark-mode");
      document.body.classList.toggle("light-mode");
    }

    function cerrarSesion() {
      window.location.href = "file:///C:/Users/eduar/Desktop/NegociosI/LoginAdmin.html";
    }

    function agregarCliente() {
      window.location.href = "AgregarCliente.html"; 
    }

    window.onload = renderizarTabla;
</script>
</body>
</html>
